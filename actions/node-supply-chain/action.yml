name: Node supply-chain evidence
description: Validate an npm lock, generate source SBOM, and audit Node dependencies

inputs:
  config:
    description: Configuration path relative to project root
    default: build-tooling.toml
  product:
    description: Product ID
    required: true
  package-directory:
    description: Directory containing package.json relative to project root
    default: .
  package-lock:
    description: npm lock path used for setup-node caching
    default: package-lock.json
  output:
    description: Source SBOM output path
    default: dist/source.cdx.json
  version:
    description: Product version; defaults to commit-derived local version
    default: ""
  platform:
    description: Target platform; defaults to runner OS
    default: ""
  audit:
    description: Run npm audit against the complete package lock
    default: "true"
  upload-name:
    description: Uploaded SBOM artifact name
    default: source-sbom
  node-version:
    description: Configured Node version
    default: "24"
  python-version:
    description: Python version used to run build tooling
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.package-lock }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install build tooling from hashed lock
      shell: bash
      env:
        TOOLING_ROOT: ${{ github.action_path }}/../..
      run: |
        python -m pip install --require-hashes -r "$TOOLING_ROOT/requirements.txt"
        python -m pip install --no-deps --no-build-isolation "$TOOLING_ROOT"

    - name: Validate supply-chain configuration
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: tapio-build --project "$GITHUB_WORKSPACE" --config "$CONFIG" config validate

    - name: Validate npm package lock
      shell: bash
      env:
        PACKAGE_DIRECTORY: ${{ inputs.package-directory }}
      run: npm ci --prefix "$GITHUB_WORKSPACE/$PACKAGE_DIRECTORY" --ignore-scripts --no-audit --no-fund

    - name: Generate source SBOM
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
        OUTPUT: ${{ inputs.output }}
        PRODUCT: ${{ inputs.product }}
        TARGET_PLATFORM: ${{ inputs.platform }}
        VERSION: ${{ inputs.version }}
      run: |
        if [[ -z "$VERSION" ]]; then VERSION="0.0.0+${GITHUB_SHA:0:12}"; fi
        if [[ -z "$TARGET_PLATFORM" ]]; then TARGET_PLATFORM="${RUNNER_OS,,}"; fi
        tapio-build --project "$GITHUB_WORKSPACE" --config "$CONFIG" node sbom \
          --product "$PRODUCT" --output "$OUTPUT" --version "$VERSION" \
          --platform "$TARGET_PLATFORM" --commit-sha "$GITHUB_SHA"

    - name: Upload source SBOM
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ${{ inputs.upload-name }}
        path: ${{ inputs.output }}
        if-no-files-found: error

    - name: Audit locked dependencies
      if: ${{ inputs.audit == 'true' }}
      shell: bash
      env:
        CONFIG: ${{ inputs.config }}
      run: tapio-build --project "$GITHUB_WORKSPACE" --config "$CONFIG" node audit
